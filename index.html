<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swappr – Don’t Sell It. Swap It.</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --green: #16a34a; /* adjust if you have a specific brand green */
  --dark-green: #15803d;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #ffffff;
  color: #000000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  text-align: center;
  max-width: 600px;
  width: 100%;
}

.logo {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--green);
  margin-bottom: 40px;
}

h1 {
  font-size: 3rem;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 20px;
}

.highlight {
  color: var(--green);
}

.subtext {
  font-size: 1.2rem;
  margin-bottom: 40px;
}

.form-group {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

input[type="email"] {
  padding: 15px;
  font-size: 1rem;
  border: 2px solid var(--green);
  border-radius: 8px;
  width: 100%;
  max-width: 300px;
  outline: none;
}

button {
  padding: 15px 25px;
  font-size: 1rem;
  font-weight: 600;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  background: var(--dark-green);
  transform: translateY(-2px);
}

.note {
  margin-top: 15px;
  font-size: 0.9rem;
}

.founding {
  margin-top: 40px;
  font-weight: 600;
  color: var(--green);
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">Swappr</div>

  <h1>
    DON’T SELL IT.<br>
    <span class="highlight">SWAP IT.</span>
  </h1>

  <p class="subtext">
    The campus swap meet is coming.
  </p>

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <input type="email" name="email" placeholder="Enter your email" required />
      <button type="submit">Get Early Access</button>
    </div>
  </form>

  <div class="note">
    Launching at Brock.
  </div>

  <div class="founding">
    Founding members get priority access.
  </div>
</div>

</body>
</html>
